<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bitcoin Price Oracle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0e14;
  --bg-surface: #0d1117;
  --bg-elevated: #131920;
  --bg-hover: #1a2230;
  --orange: #f7931a;
  --orange-dim: #f7931a66;
  --orange-glow: #f7931a22;
  --green: #3fb950;
  --red: #f85149;
  --text: #c9d1d9;
  --text-dim: #6e7681;
  --text-muted: #484f58;
  --border: #21262d;
}

html { font-size: 16px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', 'Courier New', monospace;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.03) 2px,
    rgba(0,0,0,0.03) 4px
  );
  pointer-events: none;
  z-index: 999;
}

.container {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

/* ─── HEADER ─── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2.5rem;
}

.logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.logo-icon {
  width: 28px;
  height: 28px;
  border: 2px solid var(--orange);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.75rem;
  color: var(--orange);
  flex-shrink: 0;
}

.logo-text {
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.logo-text span { color: var(--orange); }

.sync-badge {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.65rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

.sync-dot {
  width: 6px;
  height: 6px;
  background: var(--green);
  border-radius: 50%;
  flex-shrink: 0;
}

.sync-dot.syncing {
  animation: pulse-dot 1.5s ease-in-out infinite;
  background: var(--orange);
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ─── HERO PRICE ─── */
.hero {
  margin-bottom: 3rem;
  position: relative;
}

.hero::before {
  content: '';
  position: absolute;
  top: -40px;
  left: -60px;
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
  pointer-events: none;
}

.price-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.price-row {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  flex-wrap: wrap;
}

.price-value {
  font-family: 'Space Mono', monospace;
  font-size: clamp(2.5rem, 8vw, 4rem);
  font-weight: 700;
  color: #ffffff;
  line-height: 1;
  letter-spacing: -0.02em;
}

.price-value .dollar {
  color: var(--orange);
  font-weight: 400;
}

.price-change {
  font-size: 0.85rem;
  font-weight: 500;
  padding: 0.2em 0.5em;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
}

.price-change.up { color: var(--green); border-color: #3fb95033; }
.price-change.down { color: var(--red); border-color: #f8514933; }

.price-meta {
  display: flex;
  gap: 2rem;
  margin-top: 1rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  flex-wrap: wrap;
}

.price-meta span { display: flex; align-items: center; gap: 0.35rem; }
.price-meta .label { color: var(--text-muted); }

/* ─── CHART ─── */
.chart-section {
  margin-bottom: 3rem;
}

.chart-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  gap: 0.5rem;
}

.chart-title {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.timeframe-buttons {
  display: flex;
  gap: 2px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  padding: 2px;
}

.tf-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.65rem;
  padding: 0.35em 0.75em;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}

.tf-btn:hover { color: var(--text); background: var(--bg-hover); }
.tf-btn.active { color: var(--orange); background: var(--bg-elevated); }

.chart-container {
  position: relative;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  padding: 1.25rem 1rem 0.75rem;
}

.chart-container canvas {
  display: block;
  width: 100%;
  cursor: crosshair;
}

.chart-tooltip {
  position: absolute;
  pointer-events: none;
  background: var(--bg);
  border: 1px solid var(--orange-dim);
  padding: 0.5rem 0.75rem;
  font-size: 0.7rem;
  opacity: 0;
  transition: opacity 0.1s;
  z-index: 10;
  white-space: nowrap;
}

.chart-tooltip.visible { opacity: 1; }
.chart-tooltip .tt-price { color: #fff; font-weight: 700; font-size: 0.8rem; }
.chart-tooltip .tt-date { color: var(--text-dim); margin-top: 0.15rem; }
.chart-tooltip .tt-block { color: var(--text-muted); font-size: 0.6rem; margin-top: 0.15rem; }

.chart-crosshair {
  position: absolute;
  top: 0;
  width: 1px;
  height: 100%;
  background: var(--orange-dim);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
}

.chart-crosshair.visible { opacity: 1; }

/* ─── SEARCH ─── */
.search-section {
  margin-bottom: 3rem;
}

.search-title {
  font-size: 0.65rem;
  color: var(--text-muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.75rem;
}

.search-box {
  display: flex;
  border: 1px solid var(--border);
  background: var(--bg-surface);
  transition: border-color 0.2s;
}

.search-box:focus-within { border-color: var(--orange-dim); }

.search-prefix {
  padding: 0.75rem 1rem;
  color: var(--orange);
  font-size: 0.8rem;
  border-right: 1px solid var(--border);
  display: flex;
  align-items: center;
  background: var(--bg-elevated);
  user-select: none;
}

.search-input {
  flex: 1;
  background: none;
  border: none;
  color: var(--text);
  font-family: inherit;
  font-size: 0.8rem;
  padding: 0.75rem 1rem;
  outline: none;
}

.search-input::placeholder { color: var(--text-muted); }

.search-btn {
  background: var(--bg-elevated);
  border: none;
  border-left: 1px solid var(--border);
  color: var(--text-dim);
  font-family: inherit;
  font-size: 0.7rem;
  padding: 0.75rem 1.25rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.15s;
}

.search-btn:hover { color: var(--orange); background: var(--bg-hover); }

.search-result {
  margin-top: 0.5rem;
  padding: 1rem 1.25rem;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  font-size: 0.75rem;
  display: none;
}

.search-result.visible { display: block; }
.search-result.error { border-color: #f8514933; color: var(--red); }

.sr-price {
  font-size: 1.25rem;
  color: #fff;
  font-weight: 700;
  margin-bottom: 0.35rem;
}

.sr-meta {
  color: var(--text-dim);
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

/* ─── FOOTER ─── */
footer {
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 0.6rem;
  color: var(--text-muted);
  flex-wrap: wrap;
  gap: 0.5rem;
}

footer a {
  color: var(--text-dim);
  text-decoration: none;
  transition: color 0.15s;
}

footer a:hover { color: var(--orange); }

.sync-detail {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.sync-bar {
  width: 60px;
  height: 3px;
  background: var(--bg-elevated);
  overflow: hidden;
}

.sync-bar-fill {
  height: 100%;
  background: var(--green);
  transition: width 0.5s;
}

/* ─── LOADING SKELETON ─── */
.skeleton {
  background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 50%, var(--bg-elevated) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  color: transparent !important;
}

@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .container { padding: 1.25rem 1rem; }
  .price-meta { gap: 1rem; }
  header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">&#x20BF;</div>
      <div class="logo-text"><span>Bitcoin</span> Price Oracle</div>
    </div>
    <div class="sync-badge" id="syncBadge">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncText">connecting...</span>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="price-label">on-chain consensus price</div>
    <div class="price-row">
      <div class="price-value" id="priceValue"><span class="dollar">$</span><span id="priceNum" class="skeleton">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span></div>
      <div class="price-change" id="priceChange">&mdash;</div>
    </div>
    <div class="price-meta">
      <span><span class="label">block</span> <span id="blockHeight">&mdash;</span></span>
      <span><span class="label">time</span> <span id="blockTime">&mdash;</span></span>
      <span><span class="label">source</span> on-chain oracle</span>
    </div>
  </section>

  <!-- CHART -->
  <section class="chart-section">
    <div class="chart-header">
      <div class="chart-title">price history</div>
      <div class="timeframe-buttons">
        <button class="tf-btn" data-range="1M">1M</button>
        <button class="tf-btn" data-range="6M">6M</button>
        <button class="tf-btn" data-range="1Y">1Y</button>
        <button class="tf-btn active" data-range="ALL">ALL</button>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="chart" height="280"></canvas>
      <div class="chart-crosshair" id="crosshair"></div>
      <div class="chart-tooltip" id="tooltip">
        <div class="tt-price"></div>
        <div class="tt-date"></div>
        <div class="tt-block"></div>
      </div>
    </div>
  </section>

  <!-- SEARCH -->
  <section class="search-section">
    <div class="search-title">lookup price</div>
    <div class="search-box">
      <div class="search-prefix">&gt;</div>
      <input class="search-input" id="searchInput" type="text" placeholder="block height or date (YYYY-MM-DD)" spellcheck="false" autocomplete="off">
      <button class="search-btn" id="searchBtn">QUERY</button>
    </div>
    <div class="search-result" id="searchResult">
      <div class="sr-price" id="srPrice"></div>
      <div class="sr-meta" id="srMeta"></div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div>
      powered by <a href="https://github.com/bitcoinresearchkit/brk" target="_blank">brk_oracle</a> &middot; 100% on-chain data
    </div>
    <div class="sync-detail" id="syncDetail">
      <div class="sync-bar"><div class="sync-bar-fill" id="syncBarFill" style="width:0%"></div></div>
      <span id="syncProgress"></span>
    </div>
  </footer>
</div>

<script>
const API = '';
let chartData = [];
let latestPrice = null;
let healthData = null;
let activeRange = 'ALL';

// ─── Helpers ───
function fmt(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtInt(n) { return n.toLocaleString('en-US'); }
function tsToDate(ts) {
  const d = new Date(ts * 1000);
  return d.toISOString().slice(0, 10);
}
function tsToTime(ts) {
  const d = new Date(ts * 1000);
  return d.toISOString().slice(0, 16).replace('T', ' ') + ' UTC';
}
function tsToShort(ts) {
  const d = new Date(ts * 1000);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}

// ─── API ───
async function fetchJSON(url) {
  const res = await fetch(API + url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadLatest() {
  try {
    latestPrice = await fetchJSON('/api/price/latest');
    updateHero();
  } catch (e) { console.error('Failed to load latest price', e); }
}

async function loadHealth() {
  try {
    healthData = await fetchJSON('/health');
    updateSync();
  } catch (e) { console.error('Failed to load health', e); }
}

async function loadChart() {
  try {
    if (!healthData) return;
    const tip = healthData.synced_height;
    const start = 550000; // oracle starts here
    const step = Math.max(1, Math.floor((tip - start) / 500));
    const heights = [];
    for (let h = start; h <= tip; h += step) heights.push(h);
    if (heights[heights.length - 1] !== tip) heights.push(tip);

    // Fetch in chunks of 10000
    chartData = [];
    for (let i = 0; i < heights.length; i += 10000) {
      const from = heights[i];
      const to = heights[Math.min(i + 9999, heights.length - 1)];
      const data = await fetchJSON(`/api/price/range?from=${from}&to=${to}`);
      // Sample from the chunk
      const chunkStep = Math.max(1, Math.floor(data.length / (10000 / step)));
      for (let j = 0; j < data.length; j += chunkStep) {
        chartData.push(data[j]);
      }
    }

    // Deduplicate and sort
    const seen = new Set();
    chartData = chartData.filter(d => {
      if (seen.has(d.height)) return false;
      seen.add(d.height);
      return true;
    }).sort((a, b) => a.height - b.height);

    drawChart();
  } catch (e) { console.error('Failed to load chart data', e); }
}

async function load24hChange() {
  if (!latestPrice) return;
  try {
    const oneDayAgo = latestPrice.timestamp - 86400;
    // Estimate block ~144 blocks ago
    const h24 = Math.max(550000, latestPrice.height - 144);
    const prev = await fetchJSON(`/api/price/${h24}`);
    const change = ((latestPrice.price_usd - prev.price_usd) / prev.price_usd) * 100;
    const el = document.getElementById('priceChange');
    el.textContent = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
    el.className = 'price-change ' + (change >= 0 ? 'up' : 'down');
  } catch (e) {}
}

// ─── Update DOM ───
function updateHero() {
  if (!latestPrice) return;
  const numEl = document.getElementById('priceNum');
  numEl.classList.remove('skeleton');
  numEl.textContent = fmt(latestPrice.price_usd);
  document.getElementById('blockHeight').textContent = '#' + fmtInt(latestPrice.height);
  document.getElementById('blockTime').textContent = tsToTime(latestPrice.timestamp);
}

function updateSync() {
  if (!healthData) return;
  const dot = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  const bar = document.getElementById('syncBarFill');
  const progress = document.getElementById('syncProgress');

  if (healthData.syncing) {
    dot.classList.add('syncing');
    text.textContent = `syncing ${healthData.progress_percent.toFixed(1)}%`;
    bar.style.width = healthData.progress_percent + '%';
    bar.style.background = 'var(--orange)';
    progress.textContent = `${fmtInt(healthData.synced_height)} / ${fmtInt(healthData.chain_tip)}`;
  } else {
    dot.classList.remove('syncing');
    text.textContent = `synced #${fmtInt(healthData.synced_height)}`;
    bar.style.width = '100%';
    bar.style.background = 'var(--green)';
    progress.textContent = `${fmtInt(healthData.synced_height)} / ${fmtInt(healthData.chain_tip)}`;
  }
}

// ─── Chart Drawing ───
function getFilteredData() {
  if (activeRange === 'ALL' || chartData.length === 0) return chartData;
  const now = chartData[chartData.length - 1].timestamp;
  const ranges = { '1M': 30*86400, '6M': 182*86400, '1Y': 365*86400 };
  const cutoff = now - (ranges[activeRange] || 0);
  return chartData.filter(d => d.timestamp >= cutoff);
}

function drawChart() {
  const canvas = document.getElementById('chart');
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width - 32; // padding
  const h = 280;

  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const data = getFilteredData();
  if (data.length < 2) return;

  const prices = data.map(d => d.price_usd);
  const minP = Math.min(...prices) * 0.95;
  const maxP = Math.max(...prices) * 1.05;

  const padTop = 20;
  const padBot = 28;
  const padLeft = 0;
  const plotH = h - padTop - padBot;
  const plotW = w - padLeft;

  const toX = (i) => padLeft + (i / (data.length - 1)) * plotW;
  const toY = (p) => padTop + (1 - (p - minP) / (maxP - minP)) * plotH;

  // Clear
  ctx.clearRect(0, 0, w, h);

  // Grid lines
  ctx.strokeStyle = '#ffffff06';
  ctx.lineWidth = 1;
  const gridLines = 4;
  for (let i = 0; i <= gridLines; i++) {
    const y = padTop + (plotH / gridLines) * i;
    ctx.beginPath();
    ctx.moveTo(padLeft, y);
    ctx.lineTo(w, y);
    ctx.stroke();
  }

  // Price labels on right
  ctx.fillStyle = '#484f58';
  ctx.font = '10px JetBrains Mono';
  ctx.textAlign = 'right';
  for (let i = 0; i <= gridLines; i++) {
    const price = maxP - ((maxP - minP) / gridLines) * i;
    const y = padTop + (plotH / gridLines) * i;
    ctx.fillText('$' + Math.round(price).toLocaleString(), w - 2, y - 4);
  }

  // Date labels on bottom
  ctx.textAlign = 'center';
  ctx.fillStyle = '#484f58';
  const labelCount = Math.min(5, data.length);
  for (let i = 0; i < labelCount; i++) {
    const idx = Math.floor((data.length - 1) * i / (labelCount - 1));
    const x = toX(idx);
    const d = new Date(data[idx].timestamp * 1000);
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const label = activeRange === '1M' ?
      `${d.getUTCDate()} ${months[d.getUTCMonth()]}` :
      `${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
    ctx.fillText(label, x, h - 6);
  }

  // Gradient fill
  const grad = ctx.createLinearGradient(0, padTop, 0, padTop + plotH);
  grad.addColorStop(0, '#f7931a18');
  grad.addColorStop(1, '#f7931a00');

  ctx.beginPath();
  ctx.moveTo(toX(0), toY(data[0].price_usd));
  for (let i = 1; i < data.length; i++) {
    ctx.lineTo(toX(i), toY(data[i].price_usd));
  }
  ctx.lineTo(toX(data.length - 1), padTop + plotH);
  ctx.lineTo(toX(0), padTop + plotH);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(data[0].price_usd));
  for (let i = 1; i < data.length; i++) {
    ctx.lineTo(toX(i), toY(data[i].price_usd));
  }
  ctx.strokeStyle = '#f7931a';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Store chart geometry for hover
  canvas._chartMeta = { data, toX, toY, padLeft, padTop, plotH, plotW, w, h };
}

// ─── Chart Interaction ───
const canvas = document.getElementById('chart');
const tooltip = document.getElementById('tooltip');
const crosshair = document.getElementById('crosshair');

canvas.addEventListener('mousemove', (e) => {
  const meta = canvas._chartMeta;
  if (!meta || meta.data.length < 2) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const ratio = (x - meta.padLeft) / meta.plotW;
  const idx = Math.max(0, Math.min(meta.data.length - 1, Math.round(ratio * (meta.data.length - 1))));
  const d = meta.data[idx];

  tooltip.querySelector('.tt-price').textContent = '$' + fmt(d.price_usd);
  tooltip.querySelector('.tt-date').textContent = tsToShort(d.timestamp);
  tooltip.querySelector('.tt-block').textContent = 'block #' + fmtInt(d.height);

  const containerRect = canvas.parentElement.getBoundingClientRect();
  const tx = meta.toX(idx);
  const ty = meta.toY(d.price_usd);

  // Position tooltip
  let left = tx + 16;
  if (left + 170 > containerRect.width - 16) left = tx - 170;
  tooltip.style.left = (left + 16) + 'px';
  tooltip.style.top = (ty + 10) + 'px';
  tooltip.classList.add('visible');

  crosshair.style.left = (tx + 16) + 'px';
  crosshair.classList.add('visible');
});

canvas.addEventListener('mouseleave', () => {
  tooltip.classList.remove('visible');
  crosshair.classList.remove('visible');
});

// ─── Timeframe Buttons ───
document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.tf-btn.active').classList.remove('active');
    btn.classList.add('active');
    activeRange = btn.dataset.range;
    drawChart();
  });
});

// ─── Search ───
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchResult = document.getElementById('searchResult');

async function doSearch() {
  const q = searchInput.value.trim();
  if (!q) return;

  searchResult.classList.remove('visible', 'error');

  try {
    let data;
    if (/^\d{4}-\d{2}-\d{2}$/.test(q)) {
      data = await fetchJSON(`/api/price/date/${q}`);
    } else if (/^\d+$/.test(q)) {
      data = await fetchJSON(`/api/price/${q}`);
    } else {
      throw new Error('Enter a block height (e.g. 800000) or date (e.g. 2024-01-15)');
    }

    document.getElementById('srPrice').textContent = '$' + fmt(data.price_usd);
    document.getElementById('srMeta').innerHTML =
      `<span>block #${fmtInt(data.height)}</span>` +
      `<span>${tsToShort(data.timestamp)}</span>` +
      `<span>${tsToTime(data.timestamp)}</span>`;
    searchResult.classList.add('visible');
    searchResult.classList.remove('error');
  } catch (e) {
    document.getElementById('srPrice').textContent = '';
    document.getElementById('srMeta').textContent = e.message || 'Not found';
    searchResult.classList.add('visible', 'error');
  }
}

searchBtn.addEventListener('click', doSearch);
searchInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSearch(); });

// ─── Resize ───
window.addEventListener('resize', () => { if (chartData.length) drawChart(); });

// ─── Init ───
async function init() {
  await loadHealth();
  await loadLatest();
  await load24hChange();
  await loadChart();

  // Auto-refresh
  setInterval(async () => {
    await loadLatest();
    await loadHealth();
    await load24hChange();
  }, 30000);

  // Refresh chart every 5 minutes
  setInterval(loadChart, 300000);
}

init();
</script>
