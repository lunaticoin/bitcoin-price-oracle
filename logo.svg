<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(512 420) rotate(90) scale(540)">
      <stop offset="0%" stop-color="#18222B"></stop>
      <stop offset="58%" stop-color="#10161C"></stop>
      <stop offset="100%" stop-color="#090C10"></stop>
    </radialGradient>

    <radialGradient id="orbFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(438 340) rotate(50) scale(390)">
      <stop offset="0%" stop-color="#F4FAFF" stop-opacity="0.26"></stop>
      <stop offset="22%" stop-color="#B9DDF4" stop-opacity="0.16"></stop>
      <stop offset="55%" stop-color="#63859A" stop-opacity="0.10"></stop>
      <stop offset="100%" stop-color="#0C1217" stop-opacity="0.04"></stop>
    </radialGradient>

    <linearGradient id="orbStroke" x1="292" y1="252" x2="734" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4FAFF" stop-opacity="0.72"></stop>
      <stop offset="38%" stop-color="#A5D2EB" stop-opacity="0.34"></stop>
      <stop offset="100%" stop-color="#627989" stop-opacity="0.22"></stop>
    </linearGradient>

    <linearGradient id="eclipse" x1="606" y1="318" x2="450" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.82"></stop>
      <stop offset="48%" stop-color="#CBEAFF" stop-opacity="0.34"></stop>
      <stop offset="100%" stop-color="#8CCFFF" stop-opacity="0.06"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#000000" flood-opacity="0.36"></feDropShadow>
    </filter>

    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"></feGaussianBlur>
    </filter>

    <clipPath id="orbClip">
      <circle cx="512" cy="512" r="228"></circle>
    </clipPath>
  </defs>

  <!-- fondo -->
  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bg)"></rect>

  <!-- halo -->
  <circle cx="512" cy="512" r="246" fill="#90D8FF" fill-opacity="0.045" filter="url(#blur)"></circle>

  <!-- esfera -->
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="228" fill="url(#orbFill)"></circle>
    <circle cx="512" cy="512" r="220" stroke="url(#orbStroke)" stroke-width="12"></circle>
  </g>

  <!-- contenido interno recortado -->
  <g clip-path="url(#orbClip)">
    <path d="M620 344C668 392 698 458 698 530C698 640 634 734 541 776C605 730 646 641 646 535C646 453 618 385 570 340C587 338 605 340 620 344Z" fill="url(#eclipse)"></path>

    <path d="M590 338C632 382 658 444 658 516C658 634 596 731 506 776C554 730 586 640 586 534C586 451 566 386 530 342C550 338 572 336 590 338Z" fill="#081016" fill-opacity="0.34"></path>

    <path d="M382 366C416 334 460 314 510 314" stroke="#F8FCFF" stroke-opacity="0.54" stroke-width="16" stroke-linecap="round"></path>

    <ellipse cx="410" cy="402" rx="48" ry="22" transform="rotate(-28 410 402)" fill="#F6FBFF" fill-opacity="0.10"></ellipse>

    <path d="M392 646C430 682 482 704 538 704C570 704 602 697 629 683" stroke="#D6EEFF" stroke-opacity="0.14" stroke-width="10" stroke-linecap="round"></path>
  </g>
</svg>